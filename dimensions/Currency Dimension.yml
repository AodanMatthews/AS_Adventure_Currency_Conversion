unique_name: Currency Dimension
object_type: dimension
label: Currency Dimension
calculation_groups:

  - unique_name: Actual vs Budgeted (Yearly)
    label: Actual vs Budgeted (Yearly)
    description: Standard metric currency conversions for the current year using actual and budgeted rates for CY and PY
    calculated_members:

      - unique_name: 1- ACT PYRates (Y) 
        name: ACT PYRates (Y) 
        description: Metrics converted using PY actual yearly avg currency rates
        expression: >- 
          [Measures].currentMember *
          (ParallelPeriod([Date Dimension].[Date Month Hierarchy].[YearMonth], 1, [Date Dimension].[Date Month Hierarchy].CurrentMember), [Measures].[Yearly Actual Rate]) 
        format: '#,###.00;(#,###.00)'

      - unique_name: 2- ACT CYRates (Y) 
        name: ACT CYRates (Y)
        description: Metrics converted using CY actual yearly avg currency rates
        expression: >- 
          [Measures].currentMember * [Measures].[Yearly Actual Rate]
        format: '#,###.00;(#,###.00)'

      - unique_name: 3- BTT CYRates (Y) 
        name: BTT CYRates (Y)
        description: Metrics converted using CY budgeted yearly avg currency rates
        expression: >- 
          [Measures].currentMember * [Measures].[Yearly Budgeted Rate]
        format: '#,###.00;(#,###.00)'

    folder: Actual vs Budgeted Rates

  - unique_name: Actual vs Budgeted (Monthly)
    label: Actual vs Budgeted (Monthly)
    description: Standard metric currency conversions for the prior year using actual and budgeted rates for CY and PY
    calculated_members:
      - unique_name: 1- ACT PYRates (M)
        name: 1- ACT PYRates (M)
        description: Metrics converted using PY actual montlhy avg currency rates
        expression: >- 
          [Measures].currentMember *
          (ParallelPeriod([Date Dimension].[Date Month Hierarchy].[YearMonth], 1, [Date Dimension].[Date Month Hierarchy].CurrentMember), [Measures].[Monthly Actual Rate]) 
        format: '#,###.00;(#,###.00)'

      - unique_name: 2- ACT CYRates (M)
        name: 2- ACT CYRates (M)
        description: Metrics converted using CY actual montlhy avg currency rates
        expression: >- 
          [Measures].currentMember * [Measures].[Monthly Actual Rate]
        format: '#,###.00;(#,###.00)'

      - unique_name: 3- BTT CYRates (M)
        name: 3- BTT CYRates (M)
        description: Metrics converted using CY budgeted montlhy avg currency rates
        expression: >- 
          [Measures].currentMember * [Measures].[Monthly Budgeted Rate]
        format: '#,###.00;(#,###.00)'
    folder: Actual vs Budgeted Rates


hierarchies:
  - unique_name: Base Currency Hierarchy
    label: Base Currency Hierarchy
    filter_empty: 'yes'
    levels:
      - unique_name: Base Currency
  - unique_name: Reporting Currency Hierarchy
    label: Reporting Currency Hierarchy
    filter_empty: 'yes'
    levels:
      - unique_name: Reporting Currency
      - unique_name: Reporting Currency Join
      - unique_name: Reporting Date
level_attributes:
  - unique_name: Base Currency
    label: Base Currency
    contains_unique_names: false
    dataset: dimcurrency_base
    is_unique_key: false
    key_columns:
      - currencykey
    name_column: currencyalternatekey
  - unique_name: Reporting Currency Join
    label: Reporting Currency Join
    contains_unique_names: false
    dataset: factcurrencyrate_conversion
    is_hidden: true
    is_unique_key: false
    key_columns:
      - currencykey_to
    name_column: currencykey_to
  - unique_name: Reporting Currency
    label: Reporting Currency
    contains_unique_names: false
    dataset: dimcurrency_reporting
    is_unique_key: false
    key_columns:
      - currencykey
    name_column: currencyalternatekey
  - unique_name: Reporting Date
    label: Reporting Date
    contains_unique_names: false
    dataset: factcurrencyrate_conversion
    is_hidden: true
    is_unique_key: false
    key_columns:
      - datekey
    name_column: datekey
relationships:
  - from:
      dataset: factcurrencyrate_conversion
      join_columns:
        - currencykey_to
    to:
      level: Reporting Currency
    type: snowflake
type: standard
